<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <!-- Custom Colors -->
    <style>
        body {
            background-color: #2c3c53; 
        }
        .card-custom {
            background-color: #fff3cd;
            border-radius: 20px;
        }
        .btn-custom {
            background-color: #54af72;
            color: white;
        }
        .btn-custom:hover {
            background-color: #c82333;
        }
        .title-text {
            color: #1f8ab4;
            font-weight: bold;
        }
    </style>
</head>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">OBMC Database</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="achievements.html">10 - Ruby Wall of Achievements</a>
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="studentlist.html">Student List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="absences.html">Attendance Tracker</a>
                    </li>
                </ul>
            </div>
            <!-- Add search bar -->
            <form class="d-flex">
                  <input class="form-control" type="text" placeholder="Search anything">

                  <button class="btn btn-success" type="button">Search</button>
            </form>      
        </div>
    </nav>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card card-custom shadow-lg p-4" style="width: 400px;">
        <h3 class="text-center title-text mb-4">Monthly Attendance Tracker</h3>

        <form>
            <div class="mb-3">
                <label class="form-label fw-bold">Select Month</label>
                <select id="monthsOfTheYear" class="form-select">
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Absences</label>
                <input type="number" id="absences" class="form-control" placeholder="Enter number of absences">
            </div>

            <div class="d-grid">
                <input type="button" py-click="displaying" value="Submit" class="btn btn-custom">
            </div>
        </form>

        <div id="output" class="mt-3 p-2 text-center fs-5"></div>
    </div>
    <py-script src="main.py"></py-script>
</body>
</html>
