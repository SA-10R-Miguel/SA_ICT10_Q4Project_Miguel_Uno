<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBMC Student List</title>

     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <style>
        body { 
            font-family: Helvetica, sans-serif,; 
            max-width: 600px; 
            margin: 20px auto; 
            padding: 20px; 
            border: 10px solid #ccc; 
            background-color: #2c3c53;
        }
        .header { 
            text-align: center; 
            background-color: #5069bb
        }
        .form-group { 
            margin-bottom: 10px;
            background-color: #5069bb;
        }
        input { 
            padding: 8px; 
            width: 95%; 
            margin-top: 5px; 
        }
        button { 
            padding: 10px; 
            cursor: pointer; 
            background-color: #314152; 
            color: white; 
            border: none; 
            margin-top: 10px; 
        }
        .output-box { 
            margin-top: 20px; 
            border-top: 2px solid #333; 
            padding-top: 10px; 
            background-color: #5069bb;
            text-align: center;
        }
    
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">OBMC Database</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="achievements.html">10 - Ruby Wall of Achievements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="studentlist.html">Student List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="absences.html">Attendance Tracker</a>
                    </li>
                </ul>
            </div>
                </ul>
            </div>
            <!-- Add search bar -->
            <form class="d-flex">
                  <input class="form-control" type="text" placeholder="Search anything">
                  <button class="btn btn-success" type="button">Search</button>
            </form>      
        </div>
    </nav>
    <div class="header">
        <h1>OBMC Manual Student List</h1> <p>Hi! As you can see, there are three text boxes there. Just fill them up, and you have an addition to the list. Click show list and see your classmate list.</p> </div>

    <div class="form-group">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="section" placeholder="Section">
        <input type="text" id="subject" placeholder="Favorite Subject">
        <button onclick="addClassmate()">Add Classmate</button>
        <button onclick="toggleList()">Show List</button> </div>

    <div class="output-box">
        <h3>Classmate List</h3> <div id="displayArea"></div>
    </div>

    <script>

        let classmates = [
            { name: "Arianne", section: "10 - Ruby", subject: "English" },
            { name: "Sophia", section: "10 - Emerald", subject: "Social Studies" },
            { name: "Dylan", section: "10 - Ruby", subject: "Science" },
            { name: "Uno", section: "10 - Ruby", subject: "Math" },
            { name: "Lesvie", section: "10 - Emerald", subject: "Recess" }
        ];

        function addClassmate() {
            const name = document.getElementById('name').value;
            const section = document.getElementById('section').value;
            const subject = document.getElementById('subject').value;

            if(name, section, subject) {
                classmates.push({ name, section, subject });
                alert("Added " + name + " from " + section + "!");
                document.getElementById('name').value = '';
                document.getElementById('section').value = '';
                document.getElementById('subject').value = '';
                renderList();
            }
        }

        function renderList() {
            const area = document.getElementById('displayArea');
            area.innerHTML = '';
            classmates.forEach(c => {
                const p = document.createElement('p');
                p.textContent = `Hi! I am ${c.name} from ${c.section}. My favorite subject is ${c.subject}.`;
                area.appendChild(p);
            });
        }

        function toggleList() {
            renderList();
        }
    </script>
</body>
</html>
