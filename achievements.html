<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Achievements Carousel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .carousel-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 500px;
        }

        .carousel-slide {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .carousel-slide.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-slide .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 16px;
        }

        .carousel-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f9f9f9;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .carousel-counter {
            font-weight: bold;
            color: #333;
        }

        .dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #bbb;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .dot.active {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">OBMC Database</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="achievements.html">10 - Ruby Wall of Achievements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="studentlist.html">Student List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="absences.html">Attendance Tracker</a>
                    </li>
                </ul>
            </div>
            <!-- Add search bar -->
            <form class="d-flex">
                  <input class="form-control" type="text" placeholder="Search anything">

                  <button class="btn btn-success" type="button">Search</button>
            </form>      
        </div>
    </nav>
    <div class="carousel-container">
        <div class="carousel">
            <div class="carousel-slide active">
                <img src="teachersday.jpg" alt="Achievement 1">
                <div class="caption">Teachers' Day 2025</div>
            </div>
            <div class="carousel-slide">
                <img src="foodfair.jpg" alt="Achievement 2">
                <div class="caption">Food Fair 2025</div>
            </div>
            <div class="carousel-slide">
                <img src="xmasparty.jpg" alt="Achievement 3">
                <div class="caption">Christmas Party 2025</div>
            </div>
            <div class="carousel-slide">
                <img src="speechchoir.jpg" alt="Achievement 4">
                <div class="caption">Sabayang Pagbigkas 2026</div>
            </div>
            <div class="carousel-slide">
                <img src="intrams.jpg" alt="Achievement 5">
                <div class="caption">Intramurals 2026</div>
            </div>
            <div class="carousel-slide">
                <img src="peacecongress.jpg" alt="Achievement 6">
                <div class="caption">Peace Congress 2026</div>
            </div>
            <div class="carousel-slide">
                <img src="lastday.jpg" alt="Achievement 7">
                <div class="caption">Last Day of JHS 2022-2026</div>
            </div>
            <div class="carousel-slide">
                <img src="CLASSPIC.jpg" alt="Achievement 8">
                <div class="caption">Grade 10 - Ruby 2025-2026</div>
            </div>
        </div>

        <div class="carousel-controls">
            <button onclick="previousSlide()">← Previous</button>
            <span class="carousel-counter"><span id="current">1</span> / 8</span>
            <button onclick="nextSlide()">Next →</button>
        </div>

        <div class="dots">
            <span class="dot active" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
            <span class="dot" onclick="currentSlide(5)"></span>
            <span class="dot" onclick="currentSlide(6)"></span>
            <span class="dot" onclick="currentSlide(7)"></span>
            <span class="dot" onclick="currentSlide(8)"></span>
        </div>
    </div>

    <script>
        let currentSlideIndex = 1;

        function nextSlide() {
            showSlide(currentSlideIndex += 1);
        }

        function previousSlide() {
            showSlide(currentSlideIndex -= 1);
        }

        function currentSlide(n) {
            showSlide(currentSlideIndex = n);
        }

        function showSlide(n) {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.dot');

            if (n > slides.length) {
                currentSlideIndex = 1;
            }
            if (n < 1) {
                currentSlideIndex = slides.length;
            }

            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            slides[currentSlideIndex - 1].classList.add('active');
            dots[currentSlideIndex - 1].classList.add('active');
            document.getElementById('current').textContent = currentSlideIndex;
        }
    </script>
</body>
</html>
